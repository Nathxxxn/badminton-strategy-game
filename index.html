<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Badminton Strategy</title>
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>
  </div>

  <!--
    Temporary boot script for feature/animations.
    Will be replaced by src/js/main.js once the full app is wired up.
  -->
  <script type="module">
    import { Court }       from './src/js/court.js';
    import { Renderer }    from './src/js/renderer.js';
    import { ZoneOverlay } from './src/js/zones.js';
    import { DragShooter } from './src/js/drag.js';
    import { Animator }    from './src/js/animations.js';

    const canvas   = document.getElementById('game-canvas');
    const court    = new Court(canvas);
    const renderer = new Renderer(canvas, court);
    const zones    = new ZoneOverlay(canvas, court);
    const anim     = new Animator(canvas, court);

    // Sample shot exercise — shuttlecock arrives at ally's front-center
    const players = {
      ally1:     { x: 0.5,  y: 0.55, label: 'YOU' },
      ally2:     { x: 0.5,  y: 0.82 },
      opponent1: { x: 0.3,  y: 0.25 },
      opponent2: { x: 0.7,  y: 0.25 },
    };

    const shuttlecock = {
      position:   { x: 0.5, y: 0.52 },
      trajectory: [
        { x: 0.5, y: 0.35 },
        { x: 0.5, y: 0.52 },
      ],
      speed:  'slow',
      height: 'high',
    };

    // Base render: court + zones + static players. Animations draw on top each frame.
    function renderBase() {
      court.draw();
      zones.drawCorrectZones(['opponent-front-center', 'opponent-front-left']);
      renderer.drawScene(players, shuttlecock, 'ally1');
    }

    // Drag render loop
    let rafId = null;
    function startLoop() {
      if (rafId !== null) return;
      function loop() { renderBase(); drag.draw(); rafId = requestAnimationFrame(loop); }
      rafId = requestAnimationFrame(loop);
    }
    function stopLoop() {
      if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
      renderBase();
    }

    // On shot: animate flight from shuttlecock → aim point, then flash feedback
    const drag = new DragShooter(canvas, court, async (shot) => {
      stopLoop();
      drag.deactivate();

      // 1. Fly the shuttlecock to the aimed position
      const flyBase = () => { court.draw(); zones.drawCorrectZones(['opponent-front-center', 'opponent-front-left']); renderer.drawScene(players, null, 'ally1'); };
      anim._drawBase = flyBase;  // hook so Animator redraws court each frame

      // Run flight: redraw court each frame so shuttle draws on top
      await runAnimLoop(() => anim.flyShuttle(shuttlecock.position, shot.aimPoint, 'slow', 'high'));

      // 2. Flash correct/wrong feedback
      const inCorrect = ['opponent-front-center', 'opponent-front-left'].includes(
        (await import('./src/js/zones.js')).getZoneAt(shot.aimPoint.x, shot.aimPoint.y)
      );
      await runAnimLoop(() => anim.flashFeedback(inCorrect ? 'correct' : 'wrong'));

      // Show marker + re-arm
      renderBase();
      inCorrect ? zones.drawCheckmark(shot.aimPoint.x, shot.aimPoint.y)
                : zones.drawClickMarker(shot.aimPoint.x, shot.aimPoint.y);

      setTimeout(() => { drag.activate(shuttlecock.position); renderBase(); }, 1000);
    });

    /**
     * Run an animation factory (returns Promise) while continuously
     * redrawing the base frame so each anim frame composites on top.
     */
    async function runAnimLoop(factory) {
      let done = false;
      const promise = factory().then(() => { done = true; });
      while (!done) {
        renderBase();
        await new Promise(r => requestAnimationFrame(r));
      }
      await promise;
    }

    canvas.addEventListener('pointerdown', startLoop, { passive: true });
    canvas.addEventListener('pointerup',   stopLoop,  { passive: true });

    // On page load: animate the incoming shuttle before arming drag
    (async () => {
      await runAnimLoop(() => anim.flyShuttle({ x: 0.5, y: 0.35 }, shuttlecock.position, 'slow', 'high'));
      renderBase();
      drag.activate(shuttlecock.position);
    })();

    window.addEventListener('resize', () => { court._resize(); renderBase(); });
  </script>
</body>
</html>
