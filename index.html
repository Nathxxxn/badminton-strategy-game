<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F0F23">
  <title>Badminton Strategy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="hud" aria-live="polite">
    <div id="hud-level">Niv. <span id="hud-level-num">1</span></div>
    <div id="hud-center">
      <div id="hud-turn">Tour 1 / 4</div>
      <div id="hud-xp-wrap" role="progressbar" aria-label="XP" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div id="hud-xp-bar"></div>
      </div>
    </div>
    <div id="hud-right">
      <div id="hud-score">0 pts</div>
      <div id="hud-combo"></div>
    </div>
  </div>

  <div id="instruction">
    <div class="label" id="instr-label">Placement</div>
    <div class="text"  id="instr-text">Chargement…</div>
  </div>

  <div id="end-screen">
    <h2 id="end-title">Fin du rally !</h2>
    <p  id="end-score"></p>
    <p  id="end-detail"></p>
    <button id="end-btn" class="btn-primary">Rejouer</button>
  </div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
